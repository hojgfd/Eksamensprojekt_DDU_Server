<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        input, select, button { padding: 5px; margin: 5px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>Vælg din todo-liste</h1>

    <!-- Dropdown for eksisterende lister -->
    <form onsubmit="return goToList();">
        <select id="list-select" name="list">
            <option value="">Vælg liste...</option>
            {% for l in lists %}
            <option value="/{{ l }}">{{ l }}</option>
            {% endfor %}
        </select>
        <button type="submit">Open</button>
    </form>

    <h2>Opret ny liste</h2>
    <input type="text" id="new-list-name" placeholder="Skriv listenavn">
    <button type="button" onclick="addNewList()">Tilføj liste</button>

    <script>
        // Gå til valgt liste
        function goToList() {
            const select = document.getElementById('list-select');
            const url = select.value;
            if (!url) {
                alert("Vælg venligst en liste først!");
                return false;
            }
            window.location.href = url;
            return false;
        }

        // Tilføj ny liste til backend + dropdown
        function addNewList() {
            const input = document.getElementById('new-list-name');
            const name = input.value.trim();
            if (!name) {
                alert("Listenavn må ikke være tomt!");
                return;
            }

            // Send til backend for at oprette listen
            fetch('/add-todo', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `list_name=${encodeURIComponent(name)}&text=`
            }).then(res => {
                // Tilføj til dropdown
                const select = document.getElementById('list-select');
                const option = document.createElement("option");
                option.value = "/" + name;
                option.textContent = name;
                select.appendChild(option);

                // Redirect til den nye liste
                window.location.href = "/" + name;
            });

            input.value = "";
        }
    </script>
</body>
</html>
