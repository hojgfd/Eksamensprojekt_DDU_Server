<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        input, select, button { padding: 5px; margin: 5px; font-size: 1em; }
    </style>
</head>
<body>
    <h1>Vælg din todo-liste</h1>

    <!-- Dropdown for eksisterende lister -->
    <form action="" method="get" onsubmit="return goToList();">
        <select id="list-select" name="list">
            <option value="">Vælg liste...</option>
            {% for l in lists %}
            <option value="/{{ l|lower }}">{{ l }}</option>
            {% endfor %}
        </select>
        <button type="submit">Open</button>
    </form>

    <h2>Opret ny liste</h2>
    <input type="text" id="new-list-name" placeholder="Skriv listenavn">
    <button onclick="addNewList()">Tilføj liste</button>

    <script>
        // Gå til valgt liste
        function goToList() {
            const select = document.getElementById('list-select');
            const url = select.value;
            if (!url) {
                alert("Vælg venligst en liste først!");
                return false;
            }
            window.location.href = url;
            return false;
        }

        // Tilføj ny liste (kun frontend)
        function addNewList() {
            const input = document.getElementById('new-list-name');
            const name = input.value.trim();
            if(!name) {
                alert("Listenavn må ikke være tomt!");
                return;
            }

            // Tilføj listen til dropdown
            const select = document.getElementById('list-select');
            const option = document.createElement("option");
            option.value = "/" + name.toLowerCase();
            option.text = name;
            select.add(option);

            alert("Ny liste tilføjet: " + name);
            input.value = "";

            // Redirect til den nye liste
            window.location.href = "/" + name.toLowerCase();
        }
    </script>
</body>
</html>
