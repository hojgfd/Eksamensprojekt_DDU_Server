<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>
    <h1>Vælg din todo-liste</h1>
    <form action="" method="get" onsubmit="return goToList();">
        <select id="list-select" name="list">
            <option value="">Vælg liste...</option>
            <option value="/list1">list1</option>
            <option value="/list2">list2</option>
            <option value="/list3">list3</option>
            <option value="/work">Work</option>
        </select>
        <button type="submit">Open</button>
    </form>

    <script>
        function goToList() {
            const select = document.getElementById('list-select');
            const url = select.value;
            if (!url) {
                alert("Vælg venligst en liste først!");
                return false; // Forhindrer submit
            }
            window.location.href = url; // Redirect til valgt liste
            return false; // Forhindrer form submit
        }
    </script>
</body>
</html>
