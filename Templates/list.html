<!DOCTYPE html>
<html>
<head>
    <title>{{ list_name }} - TODO</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background-color: #f0f0f0; }
        button { padding: 3px 8px; cursor: pointer; }
        .completed { text-decoration: line-through; color: gray; }
        #list-name-input { font-size: 1.2em; padding: 4px; }
    </style>
</head>
<body>
    <h1>
        Liste:
        <input id="list-name-input" type="text" value="{{ list_name }}">
        <button type="button" onclick="updateListName()">Gem</button>
    </h1>

    <!-- Tilføj ny todo -->
    <form action="/add-todo" method="post" style="margin-bottom: 20px;">
        <input type="text" name="text" placeholder="Skriv en opgave" required>
        <input type="hidden" name="list_name" value="{{ list_name }}">
        <button type="submit">Tilføj</button>
    </form>

    <!-- Todos tabel -->
    <table>
        <thead>
            <tr>
                <th>Opgave</th>
                <th>Færdig</th>
                <th>Handling</th>
            </tr>
        </thead>
        <tbody>
            {% for todo in todos %}
            <tr class="{% if todo.completed %}completed{% endif %}">
                <td>{{ todo.text }}</td>
                <td style="text-align: center;">
                    <button onclick="toggleComplete({{ todo.id }})">
                        {% if todo.completed %}✔{% else %}❏{% endif %}
                    </button>
                </td>
                <td style="text-align: center;">
                    <button onclick="deleteTask({{ todo.id }})">🗑️</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="3" style="text-align: center;">Ingen opgaver endnu</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/">← Tilbage til forsiden</a>

    <script>
        // Toggle completed status ()
        function toggleComplete(taskId) {
            fetch(`/toggle-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
            .then(res => {
                if (res.ok) location.reload();
                else alert("Kunne ikke opdatere opgaven.");
            });
        }

        // Slet en todo
        function deleteTask(taskId) {
            if (!confirm("Er du sikker på, at du vil slette denne opgave?")) return;
            fetch(`/delete-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
            .then(res => {
                if (res.ok) location.reload();
                else alert("Kunne ikke slette opgaven.");
            });
        }

        // Opdater liste navn (kun frontend for nu)
        function updateListName() {
            const input = document.getElementById('list-name-input');
            const newName = input.value.trim();
            if (!newName) {
                alert("Listenavn må ikke være tomt!");
                return;
            }
            alert("Listenavn ændret til: " + newName);
            // For at ændre permanent i DB, skal du lave en route i Flask
        }
    </script>
</body>
</html>
