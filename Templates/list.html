<!DOCTYPE html>
<html>
<head>
    <title>{{ list_name }} - TODO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2e7d32;
        }

        .list-header {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 1em;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #43a047;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
        }

        button:hover {
            background-color: #2e7d32;
        }

        .todo-form {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .todo-form input {
            flex: 1;
            max-width: 400px;
        }

        /* TODO CARDS */
        .todo-card {
            background-color: #e8f5e9;
            border-left: 6px solid #43a047;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .todo-card.completed {
            background-color: #c8e6c9;
            text-decoration: line-through;
            color: gray;
        }

        .todo-text {
            flex: 1;
        }

        .actions button {
            margin-left: 5px;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2e7d32;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }

        .empty {
            text-align: center;
            color: gray;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="list-header">
            <h1>
                <input id="list-name-input" type="text" value="{{ list_name }}">
                <button onclick="updateListName()">Gem</button>
            </h1>
        </div>

        <!-- Tilføj todo -->
        <form class="todo-form" action="/add-todo" method="post">
            <input type="text" name="text" placeholder="Skriv en opgave..." required>
            <input type="hidden" name="list_name" value="{{ list_name }}">
            <button type="submit">Tilføj</button>
        </form>

        <!-- TODO LIST -->
        {% for todo in todos %}
        <div class="todo-card {% if todo.completed %}completed{% endif %}">
            <div class="todo-text">{{ todo.text }}</div>
            <div class="actions">
                <button onclick="toggleComplete({{ todo.id }})">
                    {% if todo.completed %}✔{% else %}❏{% endif %}
                </button>
                <button onclick="deleteTask({{ todo.id }})">🗑️</button>
            </div>
        </div>
        {% else %}
        <p class="empty">Ingen opgaver endnu</p>
        {% endfor %}

        <a class="back" href="/">← Tilbage til forsiden</a>
    </div>

    <script>
        function toggleComplete(taskId) {
            fetch(`/toggle-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
            .then(res => {
                if (res.ok) location.reload();
                else alert("Kunne ikke opdatere");
            });
        }

        function deleteTask(taskId) {
            if (!confirm("Slet opgaven?")) return;
            fetch(`/delete-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
            .then(res => {
                if (res.ok) location.reload();
                else alert("Kunne ikke slette");
            });
        }

        function updateListName() {
            const newName = document.getElementById('list-name-input').value.trim();
            if (!newName) {
                alert("Navn må ikke være tomt!");
                return;
            }
            alert("Listenavn ændret til: " + newName);
        }
    </script>
</body>
</html>
