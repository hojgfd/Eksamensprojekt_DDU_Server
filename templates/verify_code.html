<!DOCTYPE html>
<html>
<head>
    <title>Bekræft kode</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #43a047;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #2e7d32;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Indtast kode</h2>

    <form method="POST" action="/verify-code">
        <input type="text" name="code" placeholder="6-cifret kode" required>
        <button type="submit">Bekræft</button>
    </form>

    <form method="POST" action="/resend-code">
        <button type="submit" id="resendBtn" disabled>
            Send ny kode (<span id="countdown">20</span>)
        </button>
    </form>

<style>
    #resendBtn {
    background-color: #0b1f3a; /* mørk blå */
    color: white;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: not-allowed;
    opacity: 0.6;
}

#resendBtn.active {
    cursor: pointer;
    opacity: 1;
}
</style>

<script>
    let timeLeft = 20;

    const btn = document.getElementById("resendBtn");
    const countdown = document.getElementById("countdown");

    const interval = setInterval(() => {
        timeLeft--;
        countdown.innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(interval);
        btn.disabled = false;
        btn.classList.add("active");
        btn.innerText = "Send ny kode";
    }
    }, 1000);
</script>


    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
