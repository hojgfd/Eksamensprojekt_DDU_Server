<!DOCTYPE html>
<html>
<head>
    <title>Bekræft kode</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #43a047;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #2e7d32;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Indtast kode</h2>

    <form method="POST">
        <input type="text" name="code" placeholder="6-cifret kode" required>
        <button>Bekræft</button>
    </form>

    <form method="POST" action="/resend-code">
        <input type="hidden" name="email" value="{{ request.form.email }}">
        <button type="submit" style="background:#1976d2;">
        Send kode igen
        </button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
</div>

</body>
</html>
