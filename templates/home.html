<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        h1, h2 {
            text-align: center;
            color: #2e7d32; /* mørkegrøn */
        }

        .dropdown-container, .new-list-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        select, input[type="text"] {
            padding: 10px;
            font-size: 1em;
            border-radius: 6px;
            border: 1px solid #ccc;
            min-width: 200px;
        }

        button {
            background-color: #43a047; /* grøn */
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #2e7d32;
        }

        option {
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vælg din TODO-liste</h1>

        <!-- Dropdown for eksisterende lister -->
        <div class="dropdown-container">
            <select id="list-select" name="list">
                <option value="">Vælg liste...</option>
                {% for l in lists %}
                <option value="/{{ l }}">{{ l }}</option>
                {% endfor %}
            </select>
            <button type="button" onclick="goToList()">Åbn</button>
        </div>

        <h2>Opret ny liste</h2>
        <div class="new-list-container">
            <input type="text" id="new-list-name" placeholder="Skriv listenavn">
            <button type="button" onclick="addNewList()">Tilføj liste</button>
        </div>
    </div>

    <script>
        // Gå til valgt liste
        function goToList() {
            const select = document.getElementById('list-select');
            const url = select.value;
            if (!url) {
                alert("Vælg venligst en liste først!");
                return;
            }
            window.location.href = url;
        }

        // Tilføj ny liste (kun frontend / fake)
        function addNewList() {
            const input = document.getElementById('new-list-name');
            const name = input.value.trim();
            if (!name) {
                alert("Listenavn må ikke være tomt!");
                return;
            }

            // Tilføj til dropdown
            const select = document.getElementById('list-select');
            const option = document.createElement("option");
            option.value = "/" + name;
            option.textContent = name;
            select.appendChild(option);

            alert("Ny liste tilføjet: " + name);
            input.value = "";

            // Redirect til den nye liste
            window.location.href = "/" + name;
        }
    </script>
</body>
</html>
