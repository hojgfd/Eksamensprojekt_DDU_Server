<!DOCTYPE html>
<html>
<head>
    <title>{{ list_name }} - TODO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2e7d32;
        }

        .list-header {
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            font-size: 1em;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #43a047;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 5px;
            transition: 0.2s;
        }

        button:hover {
            background-color: #2e7d32;
        }

        .todo-form {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
        }

        .todo-form input {
            flex: 1;
            max-width: 400px;
        }

        .todo-card {
            background-color: #e8f5e9;
            border-left: 6px solid #43a047;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .todo-card.completed {
            background-color: #c8e6c9;
            text-decoration: line-through;
            color: gray;
        }

        .todo-card.removing {
            opacity: 0;
            transform: translateX(100px);
        }

        .todo-text {
            flex: 1;
        }

        .actions button {
            margin-left: 5px;
        }

        .delete-confirm {
            background-color: #e53935 !important;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #2e7d32;
            text-decoration: none;
        }

        .back:hover {
            text-decoration: underline;
        }

        .empty {
            text-align: center;
            color: gray;
        }
    #profileBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-box {
            background: white;
            width: 350px;
            margin: 120px auto;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .logout-btn {
            background: red;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }

        .delete-btn {
            background: darkred;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }

        .danger-btn {
            background: darkred;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<button onclick="openProfile()" id="profileBtn">Profil</button>

<div id="profileModal" class="modal">
    <div class="modal-box">
        <h2>Profil</h2>

        <form action="/logout" method="get">
            <button class="logout-btn">Log ud</button>
        </form>

        <button class="delete-btn" id="deleteAccountBtn">DELETE ACCOUNT</button>

        <br>
        <button onclick="closeProfile()">Luk</button>
    </div>
</div>

<div id="confirmDeleteModal" class="modal">
    <div class="modal-box">
        <h3>Er du sikker?</h3>
        <p>Dette kan ikke fortrydes</p>

        <form action="/delete-account" method="post">
            <button class="danger-btn">JA, SLET</button>
        </form>

        <br>
        <button onclick="closeConfirm()">Annuller</button>
    </div>
</div>


<div class="container">

    <div class="list-header">
        <h1>
            <input id="list-name-input" type="text" value="{{ list_name }}">
            <button onclick="updateListName()">Gem</button>
        </h1>
    </div>

    <form class="todo-form" action="/add-todo" method="post">
        <input type="text" name="text" placeholder="Skriv en opgave..." required>
        <input type="hidden" name="list_name" value="{{ list_name }}">
        <button type="submit">Tilføj</button>
    </form>

    {% for todo in todos %}
    <div class="todo-card {% if todo.completed %}completed{% endif %}">
        <div class="todo-text">{{ todo.text }}</div>
        <div class="actions">
            <button onclick="toggleComplete({{ todo.id }})">✔</button>
            <button onclick="deleteTask({{ todo.id }}, this)">🗑️</button>
        </div>
    </div>
    {% else %}
    <p class="empty">Ingen opgaver endnu</p>
    {% endfor %}

</div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{{ url_for('home') }}" style="
                display: inline-block;
                padding: 10px 20px;
                border: 2px solid #2e7d32;
                color: #2e7d32;
                text-decoration: none;
                border-radius: 6px;
                transition: 0.3s;
            " onmouseover="this.style.backgroundColor='#2e7d32'; this.style.color='white';"
               onmouseout="this.style.backgroundColor='transparent'; this.style.color='#2e7d32';">
                ← Tilbage til to-do oversigt
            </a>
        </div>
    </div>

<script>
function openProfile() {
    document.getElementById("profileModal").style.display = "block";
}

function closeProfile() {
    document.getElementById("profileModal").style.display = "none";
}

function closeConfirm() {
    document.getElementById("confirmDeleteModal").style.display = "none";
}

document.getElementById("deleteAccountBtn").addEventListener("click", function () {
    document.getElementById("confirmDeleteModal").style.display = "block";
});
</script>

<script>
function toggleComplete(taskId) {
    fetch(`/toggle-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
    .then(res => location.reload());
}

function deleteTask(taskId, btn) {
    const card = btn.closest('.todo-card');

    fetch(`/delete-todo/{{ list_name }}/${taskId}`, { method: 'POST' })
    .then(res => {
        if (res.ok) card.remove();
    });
}

function updateListName() {
    const input = document.getElementById('list-name-input');
    const newName = input.value.trim();
    const oldName = "{{ list_name }}";

    if (!newName) return alert("Navn må ikke være tomt!");

    const formData = new URLSearchParams();
    formData.append("old_name", oldName);
    formData.append("new_name", newName);

    fetch('/rename-list', {
        method: 'POST',
        body: formData
    }).then(res => {
        if (res.ok) window.location.href = `/todo/${newName}`;
    });
}
</script>

</body>
</html>
