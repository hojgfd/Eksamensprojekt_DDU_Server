<!DOCTYPE html>
<html>
<head>
    <title>Pulsmålinger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .box {
            border: 3px solid black;
            padding: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        select.box {
            border: 3px solid black;
        }

        .spacer {
            flex: 1;
        }

        canvas {
            max-width: 1000px;
            background: white;
            padding: 10px;
            border: 2px solid black;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border: 2px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #ddd;
        }
    #profileBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 15px;
            border-radius: 50px;
            border: none;
            background: #1976d2;
            color: white;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .modal-box {
            background: white;
            width: 350px;
            margin: 120px auto;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .logout-btn {
            background: red;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }

        .delete-btn {
            background: darkred;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }

        .danger-btn {
            background: darkred;
            color: white;
            padding: 12px;
            border: none;
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<button onclick="openProfile()" id="profileBtn">Profil</button>

<div id="profileModal" class="modal">
    <div class="modal-box">
        <h2>Profil</h2>

        <form action="/logout" method="get">
            <button class="logout-btn">Log ud</button>
        </form>

        <button class="delete-btn" id="deleteAccountBtn">DELETE ACCOUNT</button>

        <br>
        <button onclick="closeProfile()">Luk</button>
    </div>
</div>

<div id="confirmDeleteModal" class="modal">
    <div class="modal-box">
        <h3>Er du sikker?</h3>
        <p>Dette kan ikke fortrydes</p>

        <form action="/delete-account" method="post">
            <button class="danger-btn">JA, SLET</button>
        </form>

        <br>
        <button onclick="closeConfirm()">Annuller</button>
    </div>
</div>

<h1>Pulsmålinger</h1>

<div class="top-bar">
    <!-- Device -->
    <div class="box">Pinetime watch</div>

    <!-- Updated -->
    <div id="updated">Opdateret: -</div>

    <div class="spacer"></div>

    <!-- Time filter -->
    <select class="box" id="timeFilter" onchange="loadData()">
        <option value="1">Sidste 1 time</option>
        <option value="3">Sidste 3 timer</option>
        <option value="6">Sidste 6 timer</option>
        <option value="12">Sidste 12 timer</option>
        <option value="24" selected>Sidste 24 timer</option>
    </select>

    <!-- View mode -->
    <select class="box" id="viewMode" onchange="changeView()">
        <option value="graph" selected>Grafvisning</option>
        <option value="table">Tabelvisning</option>
    </select>
</div>

<!-- Graf -->
<canvas id="chart"></canvas>

<!-- Tabel -->
<table id="dataTable" style="display:none;">
    <thead>
        <tr>
            <th>HR</th>
            <th>Tidspunkt</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
const token = "{{ token }}";
let chart;

function openProfile() {
    document.getElementById("profileModal").style.display = "block";
}

function closeProfile() {
    document.getElementById("profileModal").style.display = "none";
}

function closeConfirm() {
    document.getElementById("confirmDeleteModal").style.display = "none";
}

document.getElementById("deleteAccountBtn").addEventListener("click", function () {
    document.getElementById("confirmDeleteModal").style.display = "block";
});

async function loadData() {
    const hours = document.getElementById("timeFilter").value;
    const view = document.getElementById("viewMode").value;

    const res = await fetch(`/api/heartrate?hours=${hours}`, {
    headers: {
        "Authorization": `Bearer ${token}`
    }
});

    if (!res.ok) {
    console.log(await res.text());
}

    if (res.status === 401) {
    alert("Session expired");
    window.location.href = "/login";
}

    const data = await res.json();

    const labels = data.map(d => new Date(d.time).toLocaleTimeString());
    const values = data.map(d => d.hr);

    const canvas = document.getElementById("chart");
    const table = document.getElementById("dataTable");
    const tbody = table.querySelector("tbody");

    if (view === "graph") {
        canvas.style.display = "block";
        table.style.display = "none";

        if (chart) chart.destroy();

        chart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: "HR",
                    data: values,
                    tension: 0.4,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    x: {
                        title: { display: true, text: "Tid" }
                    },
                    y: {
                        title: { display: true, text: "HR" },
                        suggestedMin: 40,
                        suggestedMax: 160
                    }
                }
            }
        });

    } else {
        canvas.style.display = "none";
        table.style.display = "table";

        tbody.innerHTML = "";

        // Nyeste først
        data.slice().reverse().forEach(d => {
            const row = `<tr>
                <td>${d.hr}</td>
                <td>${d.time}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    if (data.length > 0) {
        document.getElementById("updated").innerText =
            "Opdateret: " + data[data.length - 1].time;
    }
}

function changeView() {
    loadData();
}

// Auto refresh hver 5 sek
setInterval(loadData, 5000);

// Første load
loadData();
</script>

</body>
</html>
