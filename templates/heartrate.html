<!DOCTYPE html>
<html>
<head>
    <title>Pulsmålinger</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #eaeaea;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .box {
            border: 3px solid black;
            padding: 10px;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        select.box {
            border: 3px solid black;
        }

        .spacer {
            flex: 1;
        }

        canvas {
            max-width: 1000px;
            background: white;
            padding: 10px;
            border: 2px solid black;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border: 2px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background-color: #ddd;
        }
    </style>
</head>
<body>

<h1>Pulsmålinger</h1>

<div class="top-bar">
    <!-- Device -->
    <div class="box">Pinetime watch</div>

    <!-- Updated -->
    <div id="updated">Opdateret: -</div>

    <div class="spacer"></div>

    <!-- Time filter -->
    <select class="box" id="timeFilter" onchange="loadData()">
        <option value="1">Sidste 1 time</option>
        <option value="3">Sidste 3 timer</option>
        <option value="6">Sidste 6 timer</option>
        <option value="12">Sidste 12 timer</option>
        <option value="24" selected>Sidste 24 timer</option>
    </select>

    <!-- View mode -->
    <select class="box" id="viewMode" onchange="changeView()">
        <option value="graph" selected>Grafvisning</option>
        <option value="table">Tabelvisning</option>
    </select>
</div>

<!-- Graf -->
<canvas id="chart"></canvas>

<!-- Tabel -->
<table id="dataTable" style="display:none;">
    <thead>
        <tr>
            <th>HR</th>
            <th>Tidspunkt</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let chart;

async function loadData() {
    const hours = document.getElementById("timeFilter").value;
    const view = document.getElementById("viewMode").value;

    const res = await fetch(`/api/heartrate?hours=${hours}`);
    const data = await res.json();

    const labels = data.map(d => new Date(d.time).toLocaleTimeString());
    const values = data.map(d => d.hr);

    const canvas = document.getElementById("chart");
    const table = document.getElementById("dataTable");
    const tbody = table.querySelector("tbody");

    if (view === "graph") {
        canvas.style.display = "block";
        table.style.display = "none";

        if (chart) chart.destroy();

        chart = new Chart(canvas, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: "HR",
                    data: values,
                    tension: 0.4,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                animation: false,
                scales: {
                    x: {
                        title: { display: true, text: "Tid" }
                    },
                    y: {
                        title: { display: true, text: "HR" },
                        suggestedMin: 40,
                        suggestedMax: 160
                    }
                }
            }
        });

    } else {
        canvas.style.display = "none";
        table.style.display = "table";

        tbody.innerHTML = "";

        // Nyeste først
        data.slice().reverse().forEach(d => {
            const row = `<tr>
                <td>${d.hr}</td>
                <td>${d.time}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    if (data.length > 0) {
        document.getElementById("updated").innerText =
            "Opdateret: " + data[data.length - 1].time;
    }
}

function changeView() {
    loadData();
}

// Auto refresh hver 5 sek
setInterval(loadData, 5000);

// Første load
loadData();
</script>

</body>
</html>
