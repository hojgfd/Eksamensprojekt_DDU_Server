<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus-mode</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d9d9d9;
            color: #111;
        }

        .focus-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .focus-card {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            text-align: center;
        }

        .focus-title {
            font-size: 3.2rem;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .focus-subtitle {
            font-size: 1.2rem;
            color: #444;
            margin-bottom: 30px;
        }

        .status-box {
            display: inline-block;
            background-color: #edf7ee;
            color: #1b5e20;
            padding: 10px 18px;
            border-radius: 999px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: bold;
            margin: 20px 0 30px 0;
            color: #111;
        }

        .time-options {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .time-btn {
            background-color: #18b342;
            color: white;
            border: none;
            border-radius: 14px;
            padding: 14px 22px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s ease;
            min-width: 90px;
        }

        .time-btn:hover {
            background-color: #129536;
            transform: translateY(-2px);
        }

        .time-btn.active {
            background-color: #0d7c2b;
            box-shadow: 0 0 0 4px rgba(24, 179, 66, 0.18);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .action-btn {
            border: none;
            border-radius: 16px;
            padding: 14px 26px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s ease;
            font-weight: bold;
        }

        .start-btn {
            background-color: #18b342;
            color: white;
        }

        .start-btn:hover {
            background-color: #129536;
        }

        .pause-btn {
            background-color: #f0ad4e;
            color: white;
        }

        .pause-btn:hover {
            background-color: #d8922e;
        }

        .reset-btn {
            background-color: #e53935;
            color: white;
        }

        .reset-btn:hover {
            background-color: #c62828;
        }

        .focus-info {
            margin: 20px auto 30px auto;
            max-width: 500px;
            font-size: 1rem;
            color: #555;
            line-height: 1.5;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #18b342;
            color: white;
            padding: 14px 30px;
            border-radius: 18px;
            font-weight: bold;
            transition: 0.2s ease;
        }

        .back-btn:hover {
            background-color: #129536;
        }

        @media (max-width: 600px) {
            .focus-title {
                font-size: 2.4rem;
            }

            .timer-display {
                font-size: 3rem;
            }

            .focus-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="focus-page">
        <div class="focus-card">
            <h1 class="focus-title">Fokus-mode</h1>
            <p class="focus-subtitle">Vælg en fokustid og start din arbejdsperiode</p>

            <div class="status-box" id="statusText">Ikke startet</div>

            <div class="timer-display" id="timer">25:00</div>

            <div class="time-options">
                <button class="time-btn" onclick="setFocusTime(15, this)">15 min</button>
                <button class="time-btn active" onclick="setFocusTime(25, this)">25 min</button>
                <button class="time-btn" onclick="setFocusTime(45, this)">45 min</button>
                <button class="time-btn" onclick="setFocusTime(60, this)">60 min</button>
            </div>

            <div class="action-buttons">
                <button class="action-btn start-btn" onclick="startTimer()">Start</button>
                <button class="action-btn pause-btn" onclick="pauseTimer()">Pause</button>
                <button class="action-btn reset-btn" onclick="resetTimer()">Nulstil</button>
            </div>

            <p class="focus-info">
                Brug fokus-mode til at arbejde uden forstyrrelser i et valgt tidsrum.
                Når tiden er gået, kan I senere koble det sammen med jeres Pinetime ur.
            </p>

            <a href="{{ url_for('landing') }}" class="back-btn">Tilbage</a>
        </div>
    </div>

    <script>
        let selectedMinutes = 25;
        let totalSeconds = selectedMinutes * 60;
        let timerInterval = null;
        let isRunning = false;

        const timerDisplay = document.getElementById("timer");
        const statusText = document.getElementById("statusText");

        function updateDisplay() {
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            timerDisplay.textContent =
                String(minutes).padStart(2, '0') + ":" + String(seconds).padStart(2, '0');
        }

        function setFocusTime(minutes, clickedButton) {
            if (isRunning) return;

            selectedMinutes = minutes;
            totalSeconds = minutes * 60;
            updateDisplay();
            statusText.textContent = "Klar til " + minutes + " min fokus";

            document.querySelectorAll(".time-btn").forEach(btn => {
                btn.classList.remove("active");
            });

            clickedButton.classList.add("active");
        }

        function startTimer() {
            if (isRunning) return;
            if (totalSeconds <= 0) return;

            isRunning = true;
            statusText.textContent = "Fokus er i gang";

            timerInterval = setInterval(() => {
                totalSeconds--;
                updateDisplay();

                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    statusText.textContent = "Fokus færdigt";
                    alert("Din fokus-tid er slut!");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            statusText.textContent = "Sat på pause";
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = selectedMinutes * 60;
            updateDisplay();
            statusText.textContent = "Nulstil til " + selectedMinutes + " min";
        }

        updateDisplay();
    </script>
</body>
</html>
