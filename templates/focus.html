<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fokus-mode data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #d9d9d9;
            color: #111;
        }

        .page {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 10px 0;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .summary-box {
            background: #18b342;
            color: white;
            border-radius: 18px;
            padding: 20px;
            text-align: center;
        }

        .summary-box h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: normal;
        }

        .summary-box p {
            margin: 10px 0 0 0;
            font-size: 2rem;
            font-weight: bold;
        }

        .chart-container {
            margin: 30px 0;
            background: #f8f8f8;
            padding: 20px;
            border-radius: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            background: #fff;
            overflow: hidden;
            border-radius: 16px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 14px;
            text-align: center;
        }

        th {
            background-color: #18b342;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f6f6f6;
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            text-decoration: none;
            background-color: #18b342;
            color: white;
            padding: 14px 26px;
            border-radius: 14px;
            font-weight: bold;
        }

        .empty-message {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 2.2rem;
            }

            .card {
                padding: 20px;
            }

            th, td {
                font-size: 0.9rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>Fokus-mode</h1>
            <p class="subtitle">Data fra fokus-sessioner på PineTime</p>

            <div class="summary">
                <div class="summary-box">
                    <h2>Samlet tid i fokus-mode</h2>
                    <p id="totalMinutes">0 min</p>
                </div>
                <div class="summary-box">
                    <h2>Samlede distractions</h2>
                    <p id="totalDistractions">0</p>
                </div>
                <div class="summary-box">
                    <h2>Gennemsnit pr. dag</h2>
                    <p id="avgMinutes">0 min</p>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="focusChart"></canvas>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Dato</th>
                        <th>Tid i fokus-mode (min.)</th>
                        <th>Distractions logged</th>
                    </tr>
                </thead>
                <tbody id="focusTableBody"></tbody>
            </table>

            <p class="empty-message" id="emptyMessage" style="display:none;">
                Ingen fokusdata endnu.
            </p>

            <a href="{{ url_for('landing') }}" class="back-btn">Tilbage</a>
        </div>
    </div>

    <script>
        const token = "{{ token or '' }}";
        console.log("TOKEN:", token);

        let focusChart = null;

        function formatDate(dateString) {
            const date = new Date(dateString);
            if (isNaN(date)) return dateString;

            const day = String(date.getDate()).padStart(2, "0");
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const year = String(date.getFullYear()).slice(-2);

            return `${day}/${month}/${year}`;
        }

        async function loadFocusData() {
            const response = await fetch('/api/focus-data', {
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

            if (response.status === 401) {
            alert("Session expired. Log ind igen.");
            window.location.href = "/login";
            return;
        }

            const data = await response.json();

            const tbody = document.getElementById('focusTableBody');
            const emptyMessage = document.getElementById('emptyMessage');

            tbody.innerHTML = "";

            if (!data.length) {
                emptyMessage.style.display = "block";
                updateSummary([]);
                drawChart([]);
                return;
            }

            emptyMessage.style.display = "none";

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${formatDate(row.date)}</td>
                    <td>${row.minutes}</td>
                    <td>${row.distractions}</td>
                `;
                tbody.appendChild(tr);
            });

            updateSummary(data);
            drawChart(data);
        }

        function updateSummary(data) {
            const totalMinutes = data.reduce((sum, row) => sum + row.minutes, 0);
            const totalDistractions = data.reduce((sum, row) => sum + row.distractions, 0);
            const avgMinutes = data.length ? Math.round(totalMinutes / data.length) : 0;

            document.getElementById('totalMinutes').textContent = `${totalMinutes} min`;
            document.getElementById('totalDistractions').textContent = totalDistractions;
            document.getElementById('avgMinutes').textContent = `${avgMinutes} min`;
        }

        function drawChart(data) {
            const labels = data.map(row => formatDate(row.date));
            const minutesData = data.map(row => row.minutes);
            const distractionsData = data.map(row => row.distractions);

            const ctx = document.getElementById('focusChart').getContext('2d');

            if (focusChart) {
                focusChart.destroy();
            }

            focusChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Fokus-tid (min.)',
                            data: minutesData,
                            borderColor: '#18b342',
                            backgroundColor: '#18b342',
                            tension: 0.25,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: 'Distractions',
                            data: distractionsData,
                            backgroundColor: '#f39c12',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Minutter'
                            }
                        },
                        y1: {
                            beginAtZero: true,
                            position: 'right',
                            grid: {
                                drawOnChartArea: false
                            },
                            title: {
                                display: true,
                                text: 'Distractions'
                            }
                        }
                    }
                }
            });
        }

        loadFocusData();
    </script>
</body>
</html>
